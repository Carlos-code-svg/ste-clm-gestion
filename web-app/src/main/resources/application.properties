# Configuración de Base de Datos para Pruebas/Producción
spring.datasource.url=${DB_URL:jdbc:h2:mem:steclmdb}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.H2Dialect}

# Seguridad (Simulación para pruebas)
spring.security.user.name=admin
spring.security.user.password=steclm2024

# Subida de archivos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Puerto del servidor (Dinámico para despliegue)
server.port=${PORT:8080}
