<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>STE-CLM | Crear Contenido</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container-form">
        <header>
            <div class="logo-container">
                <div class="logo-placeholder">STE-CLM</div>
            </div>
            <h1>Crear Nuevo Contenido para la App</h1>
        </header>

        <section class="form-section">
            <form action="/submit-content" method="post" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="subject">Asunto</label>
                    <input type="text" id="subject" name="subject" required placeholder="Escriba el título de la noticia o aviso...">
                </div>

                <div class="form-group">
                    <label for="introduction">Introducción</label>
                    <textarea id="introduction" name="introduction" rows="6" required placeholder="Describa brevemente el contenido que aparecerá en la app..."></textarea>
                </div>

                <div class="form-group">
                    <label for="files">Adjuntar Archivos (PDF, Imágenes)</label>
                    <input type="file" id="files" name="files" multiple>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn-primary">Publicar y Notificar App</button>
                    <a href="/" class="btn-secondary">Cancelar</a>
                </div>
            </form>
        </section>
    </div>
</body>
</html>
