<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>STE-CLM | Gestión de Contenido</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-container">
                <!-- Simulación del logo del sindicato -->
                <div class="logo-placeholder">STE-CLM</div>
            </div>
            <h1>Bienvenido a la Plataforma STE-CLM</h1>
        </header>

        <section class="login-section">
            <p>Por favor, inicie sesión para acceder al contenido y herramientas de gestión.</p>
            <form action="/form" method="get">
                <div class="form-group">
                    <label for="username">Usuario / Email</label>
                    <input type="text" id="username" name="username" required placeholder="Ej: admin@ste-clm.es">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required placeholder="********">
                </div>
                <button type="submit" class="btn-primary">Acceder</button>
            </form>
        </section>
    </div>
</body>
</html>
